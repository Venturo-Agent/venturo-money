server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 強制 cache control — index.html 不快取（讓更新立刻生效）、config.js 也不快取
    location = /index.html { add_header Cache-Control "no-cache, no-store, must-revalidate"; }
    location = /config.js  { add_header Cache-Control "no-cache, no-store, must-revalidate"; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 基本資安 header
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 健康檢查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
